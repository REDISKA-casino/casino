<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Рулетка</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffa502; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    canvas { display: block; margin: 0 auto; border: 1px solid #333; border-radius: 12px; background: #000; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin: 12px 0; }
    .bet-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .color-btn { padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; text-align: center; }
    .btn-red { background: #ff4757; } .btn-black { background: #000; border: 1px solid #333; } .btn-green { background: #00b894; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: right; font-size: 18px; box-sizing: border-box; margin-top: 8px; }
    .btn-spin { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); margin-top: 12px; }
    .btn-spin:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>🎡Рулетка</h1>
    <div class="status-text" id="status-text">Выберите цвет</div>
    <canvas id="roulette" width="300" height="300"></canvas>
    <div class="controls-box" style="margin-top:16px;">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" />
      <div class="bet-controls">
        <button class="color-btn btn-red" id="btn-red">Красное</button>
        <button class="color-btn btn-black" id="btn-black">Чёрное</button>
        <button class="color-btn btn-green" id="btn-green">Зелёное</button>
      </div>
      <button class="btn-spin" id="btn-spin">Крутить</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('roulette');
    const ctx = canvas.getContext('2d');
    const SECTORS = 37;
    const colors = [];
    for(let i=0;i<SECTORS;i++){ colors[i]=i===0?'green':i%2===0?'black':'red'; }
    
    function draw(){
      const cx=150,cy=150,r=140,sa=2*Math.PI/SECTORS;
      ctx.clearRect(0,0,300,300);
      for(let i=0;i<SECTORS;i++){
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,i*sa-Math.PI/2,(i+1)*sa-Math.PI/2); ctx.closePath();
        ctx.fillStyle=colors[i]==='green'?'#00b894':colors[i]==='red'?'#ff4757':'#000'; ctx.fill(); ctx.stroke();
      }
      ctx.fillStyle='#fff'; ctx.font='bold 12px system-ui'; ctx.textAlign='center';
      for(let i=0;i<SECTORS;i++){ const a=i*sa+sa/2-Math.PI/2; ctx.fillText(i,cx+Math.cos(a)*110,cy+Math.sin(a)*110); }
    }
    draw();
    
    let balance = parseInt(localStorage.getItem('bal_test')) || 1000;
    document.getElementById('balance-display').textContent = balance + ' ₽';
    
    let selected = null;
    document.getElementById('btn-red').onclick=()=>selected='red';
    document.getElementById('btn-black').onclick=()=>selected='black';
    document.getElementById('btn-green').onclick=()=>selected='green';
    
    document.getElementById('btn-spin').onclick=()=>{
      if(!selected) return;
      const bet = +document.getElementById('bet-input').value;
      if(bet>balance) return alert('Мало средств');
      balance -= bet;
      const idx = Math.floor(Math.random()*SECTORS);
      const won = colors[idx] === selected;
      if(won) balance += (colors[idx]==='green'?bet*10:bet*2);
      localStorage.setItem('bal_test', balance);
      document.getElementById('balance-display').textContent = balance + ' ₽';
      document.getElementById('status-text').textContent = `Выпало: ${idx} (${colors[idx]}) ${won?'+':'—'}`;
      document.getElementById('status-text').style.color = won?'#2ed573':'#ff4757';
      selected = null;
    };
  </script>
</body>
</html>
