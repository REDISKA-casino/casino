<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Рулетка</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1e1e1e;
      --text: #e0e0e0;
      --accent: #ff4757;
      --success: #2ed573;
      --gold: #ffa502;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      padding: 16px 16px 0 16px;
      gap: 12px;
    }
    .back-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:active { transform: scale(0.95); }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container {
      width: 100%;
      max-width: 500px;
      padding: 16px;
    }
    .roulette-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #000;
      border-radius: 12px;
      border: 1px solid #333;
      touch-action: none;
      margin-bottom: 16px;
    }
    .wheel-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      transform-origin: center center;
      will-change: transform;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
    }
    .indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 24px solid white;
      z-index: 10;
    }
    .status-text {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
      min-height: 28px;
    }
    .bet-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .color-btn {
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s, border-color 0.2s;
      color: white;
      text-align: center;
    }
    .color-btn:active { transform: scale(0.98); }
    .btn-red { background: #ff4757; }
    .btn-black { background: #000; }
    .btn-green { background: #00b894; }
    .controls-box {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    .balance-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      padding: 8px 0;
      margin-bottom: 12px;
      font-size: 18px;
      border: none;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: #fff;
      text-align: right;
      font-size: 18px;
      box-sizing: border-box;
      margin-top: 8px;
    }
    .btn-spin {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      background: var(--accent);
      color: white;
      margin-top: 12px;
    }
    .btn-spin:active { transform: scale(0.98); }
    .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }
    .history-box {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">← Назад</a>
  </div>
  <div class="game-container">
    <h1>🎡Рулетка</h1>
    <div class="status-text" id="status-text">Выберите цвет и сделайте ставку</div>

    <div class="roulette-wrapper">
      <div class="indicator"></div>
      <div class="wheel-container" id="wheel">
        <canvas id="roulette"></canvas>
      </div>
    </div>

    <div class="controls-box">
      <div class="balance-box">
        <span>Баланс</span>
        <span id="balance-display">1 000 ₽</span>
      </div>

      <label style="display:block; margin-bottom:6px;">Ставка</label>
      <input type="number" id="bet-input" min="1" value="100" />

      <div class="bet-controls">
        <button class="color-btn btn-red" id="btn-red">2x<br>Красное</button>
        <button class="color-btn btn-black" id="btn-black">2x<br>Чёрное</button>
        <button class="color-btn btn-green" id="btn-green">10x<br>Зелёное</button>
      </div>

      <button class="btn-spin" id="btn-spin">Крутить</button>
    </div>

    <div class="history-box" id="history-box">История раундов</div>
  </div>

  <script>
    const balanceEl = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const btnSpin = document.getElementById('btn-spin');
    const btnRed = document.getElementById('btn-red');
    const btnBlack = document.getElementById('btn-black');
    const btnGreen = document.getElementById('btn-green');
    const statusEl = document.getElementById('status-text');
    const wheelEl = document.getElementById('wheel');
    const canvas = document.getElementById('roulette');
    const ctx = canvas.getContext('2d');
    const historyBox = document.getElementById('history-box');

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';

    function getCurrentUser() {
      return localStorage.getItem(CURRENT_USER_KEY);
    }

    function getUserBalance() {
      const currentUser = getCurrentUser();
      if (!currentUser) return 1000;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          return accounts[currentUser].balance;
        }
      } catch(e) {}
      return 1000;
    }

    function saveBalance(newBalance) {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          accounts[currentUser].balance = newBalance;
          localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
        }
      } catch(e) {}
    }

    if (!getCurrentUser()) {
      window.location.href = 'index.html';
    }

    let balance = getUserBalance();
    
    let bet = 0;
    let isSpinning = false;
    let selectedColor = null;

    const SECTORS = 37;
    const SPIN_DURATION = 6000;
    const BASE_ROTATIONS = 5;

    const sectorColors = [];
    for (let i = 0; i < SECTORS; i++) {
      if (i === 0) sectorColors[i] = 'green';
      else if (i % 2 === 0) sectorColors[i] = 'black';
      else sectorColors[i] = 'red';
    }

    function getSectorColor(index) {
      return sectorColors[index];
    }

    function updateBalanceAndSave() {
      saveBalance(balance);
      updateBalanceDisplay();
    }

    function resize() {
      const size = Math.min(canvas.parentElement.clientWidth, window.innerHeight - 250);
      const dpr = window.devicePixelRatio || 1;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheelStatic();
    }
    window.addEventListener('resize', resize);
    resize();

    function drawWheelStatic() {
      const size = Math.min(canvas.parentElement.clientWidth, window.innerHeight - 250);
      ctx.clearRect(0, 0, size, size);
      const cx = size / 2;
      const cy = size / 2;
      const radius = Math.min(cx, cy) * 0.9;
      const textRadius = radius * 0.78;
      const centerDotRadius = radius * 0.12;

      const sectorAngle = (2 * Math.PI) / SECTORS;

      for (let i = 0; i < SECTORS; i++) {
        const startAngle = i * sectorAngle - Math.PI / 2;
        const endAngle = (i + 1) * sectorAngle - Math.PI / 2;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();

        const color = sectorColors[i];
        if (color === 'green') ctx.fillStyle = '#00b894';
        else if (color === 'red') ctx.fillStyle = '#ff4757';
        else ctx.fillStyle = '#000';
        
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 16px system-ui';

      for (let i = 0; i < SECTORS; i++) {
        const midAngle = i * sectorAngle + sectorAngle / 2 - Math.PI / 2;
        const x = cx + Math.cos(midAngle) * textRadius;
        const y = cy + Math.sin(midAngle) * textRadius;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(midAngle + Math.PI / 2);
        ctx.fillText(i.toString(), 0, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, centerDotRadius, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function setSelected(sel, ...others) {
      sel.style.border = '2px solid #fff';
      others.forEach(b => b.style.border = '');
    }

    btnRed.addEventListener('click', () => {
      selectedColor = 'red';
      setSelected(btnRed, btnBlack, btnGreen);
      statusEl.textContent = 'Выбрано: Красное';
      statusEl.style.color = '#ff4757';
    });
    btnBlack.addEventListener('click', () => {
      selectedColor = 'black';
      setSelected(btnBlack, btnRed, btnGreen);
      statusEl.textContent = 'Выбрано: Чёрное';
      statusEl.style.color = '#000';
    });
    btnGreen.addEventListener('click', () => {
      selectedColor = 'green';
      setSelected(btnGreen, btnRed, btnBlack);
      statusEl.textContent = 'Выбрано: Зелёное';
      statusEl.style.color = '#00b894';
    });

    btnSpin.addEventListener('click', () => {
      if (isSpinning) return;
      if (!selectedColor) {
        statusEl.textContent = 'Сначала выберите цвет!';
        statusEl.style.color = '#ff4757';
        return;
      }
      bet = Number(betInput.value);
      if (!bet || bet <= 0 || bet > balance) {
        alert('Некорректная ставка или недостаточно средств');
        return;
      }
      startSpin();
    });

    function startSpin() {
      isSpinning = true;
      betInput.disabled = true;
      [btnSpin, btnRed, btnBlack, btnGreen].forEach(b => b.disabled = true);
      statusEl.textContent = 'Крутится…';
      statusEl.style.color = '#ffa502';
      balance -= bet;
      updateBalanceAndSave();

      const targetSector = Math.floor(Math.random() * SECTORS);
      const sectorAngleDeg = (targetSector / SECTORS) * 360 + (360 / SECTORS / 2);
      const rotations = BASE_ROTATIONS + Math.floor(Math.random() * 4);
      const totalAngle = rotations * 360 + (360 - sectorAngleDeg);

      const startTime = performance.now();

      function animate(t) {
        const elapsed = t - startTime;
        const progress = Math.min(elapsed / SPIN_DURATION, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        const angleDeg = totalAngle * ease;

        wheelEl.style.transform = `rotate(${angleDeg}deg)`;

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          finishSpin(targetSector);
        }
      }
      requestAnimationFrame(animate);
    }

    function finishSpin(sectorIndex) {
      isSpinning = false;
      betInput.disabled = false;
      [btnSpin, btnRed, btnBlack, btnGreen].forEach(b => b.disabled = false);

      let winAmount = 0;
      let resultText = '';
      let color = '';

      const actualColor = sectorColors[sectorIndex];
      
      if (actualColor === 'green') {
        resultText = `Выпало: ${sectorIndex} (Зелёное)`;
        color = '#00b894';
      } else if (actualColor === 'red') {
        resultText = `Выпало: ${sectorIndex} (Красное)`;
        color = '#ff4757';
      } else {
        resultText = `Выпало: ${sectorIndex} (Чёрное)`;
        color = '#333';
      }

      if (actualColor === selectedColor) {
        winAmount = (actualColor === 'green') ? bet * 10 : bet * 2;
      }

      balance += winAmount;
      updateBalanceAndSave();
      statusEl.textContent = resultText;
      statusEl.style.color = color;
      addToHistory(winAmount > 0 ? `Победа: ${winAmount} ₽ (${resultText})` : `Проигрыш: ${bet} ₽ (${resultText})`);

      selectedColor = null;
      [btnRed, btnBlack, btnGreen].forEach(b => b.style.border = '');
    }

    function updateBalanceDisplay() {
      balanceEl.textContent = `${balance.toLocaleString()} ₽`;
    }

    function addToHistory(text) {
      const p = document.createElement('div');
      p.textContent = text;
      historyBox.prepend(p);
      while (historyBox.children.length > 20) {
        historyBox.lastChild.remove();
      }
    }

    updateBalanceDisplay();
  </script>
</body>
</html>
