<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Рулетка</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffa502; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .wheel-section { position: relative; display: flex; justify-content: center; margin-bottom: 16px; }
    canvas { display: block; border-radius: 50%; border: 3px solid #444; }
    .indicator { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); z-index: 10; width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 24px solid #fff; filter: drop-shadow(0 0 3px rgba(0,0,0,0.8)); }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .bet-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .color-btn { padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; text-align: center; }
    .color-btn:disabled { opacity: 0.5; }
    .btn-red { background: #ff4757; } .btn-black { background: #000; border: 1px solid #333; } .btn-green { background: #00b894; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: right; font-size: 18px; box-sizing: border-box; margin-top: 8px; }
    .btn-spin { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); margin-top: 12px; }
    .btn-spin:disabled { opacity: 0.5; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 150px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn" onclick="localStorage.setItem('coming_back','true')">← Назад</a></div>
  <div class="game-container">
    <h1>🎡Рулетка</h1>
    <div class="status-text" id="status-text">Выберите цвет и сделайте ставку</div>
    <div class="wheel-section">
      <div class="indicator"></div>
      <canvas id="roulette" width="300" height="300"></canvas>
    </div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <label>Ставка</label>
      <input type="number" id="bet-input" min="1" value="100" />
      <div class="bet-controls">
        <button class="color-btn btn-red" id="btn-red">2x<br>Красное</button>
        <button class="color-btn btn-black" id="btn-black">2x<br>Чёрное</button>
        <button class="color-btn btn-green" id="btn-green">10x<br>Зелёное</button>
      </div>
      <button class="btn-spin" id="btn-spin">Крутить</button>
    </div>
    <div class="history-box" id="history-box">История раундов</div>
  </div>
  <script>
    const BIN_ID = '6a516a15f5f4af5e297ecf15';
    const MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    let currentUser = localStorage.getItem('currentUser');
    if (!currentUser) { window.location.href = 'index.html'; }
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let bet = 0, isSpinning = false, selectedColor = null;
    const SECTORS = 37, colors = [];
    for(let i=0;i<SECTORS;i++){ colors[i]=i===0?'green':i%2===0?'black':'red'; }
    let accountsCache = {};

    async function loadAcc() { try { const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } }); const d = await r.json(); accountsCache = d.record || {}; } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; syncNow(); }
    async function syncNow() { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }
    document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`;

    const canvas = document.getElementById('roulette');
    const ctx = canvas.getContext('2d');
    const SIZE = 300, CX = 150, CY = 150, R = 143, TR = 118, CR = 14;

    function drawWheel(){
      const sa = 2*Math.PI/SECTORS;
      ctx.clearRect(0,0,SIZE,SIZE);
      ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();
      for(let i=0;i<SECTORS;i++){ ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,i*sa-Math.PI/2,(i+1)*sa-Math.PI/2); ctx.closePath(); ctx.fillStyle=colors[i]==='green'?'#00b894':colors[i]==='red'?'#ff4757':'#000'; ctx.fill(); ctx.strokeStyle='#222'; ctx.lineWidth=0.5; ctx.stroke(); }
      ctx.fillStyle='#fff'; ctx.font='bold 10px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
      for(let i=0;i<SECTORS;i++){ const midAngle = i*sa + sa/2 - Math.PI/2; const textAngle = midAngle + Math.PI - Math.PI/2; const x = CX + Math.cos(midAngle) * TR; const y = CY + Math.sin(midAngle) * TR; ctx.save(); ctx.translate(x, y); ctx.rotate(textAngle); ctx.fillText(i.toString(), 0, 0); ctx.restore(); }
      ctx.beginPath(); ctx.arc(CX,CY,CR,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
    }
    drawWheel();

    function setSelected(s,...o){ s.style.border='2px solid #fff'; o.forEach(b=>{b.style.border=b.classList.contains('btn-black')?'1px solid #333':'none';}); }
    document.getElementById('btn-red').onclick=()=>{if(isSpinning)return;selectedColor='red';setSelected(document.getElementById('btn-red'),document.getElementById('btn-black'),document.getElementById('btn-green'));};
    document.getElementById('btn-black').onclick=()=>{if(isSpinning)return;selectedColor='black';setSelected(document.getElementById('btn-black'),document.getElementById('btn-red'),document.getElementById('btn-green'));};
    document.getElementById('btn-green').onclick=()=>{if(isSpinning)return;selectedColor='green';setSelected(document.getElementById('btn-green'),document.getElementById('btn-red'),document.getElementById('btn-black'));};

    document.getElementById('btn-spin').onclick=()=>{
      if(isSpinning||!selectedColor)return;
      bet=+document.getElementById('bet-input').value;
      if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;}
      isSpinning=true; document.getElementById('btn-spin').disabled=true; document.getElementById('btn-red').disabled=true; document.getElementById('btn-black').disabled=true; document.getElementById('btn-green').disabled=true;
      balance-=bet; saveBal();
      const target=Math.floor(Math.random()*SECTORS);
      const targetAngle = 360 - ((target/SECTORS)*360 + (360/SECTORS/2));
      const rotations = 5 + Math.floor(Math.random()*4);
      const totalAngle = rotations*360 + targetAngle;
      canvas.style.transition = 'transform 5s cubic-bezier(0.2,0.8,0.2,1)';
      canvas.style.transform = `rotate(${totalAngle}deg)`;
      setTimeout(() => {
        canvas.style.transition = 'none'; canvas.style.transform = `rotate(${targetAngle}deg)`;
        isSpinning=false; document.getElementById('btn-spin').disabled=false; document.getElementById('btn-red').disabled=false; document.getElementById('btn-black').disabled=false; document.getElementById('btn-green').disabled=false;
        const c=colors[target]; let w=0; if(c===selectedColor)w=c==='green'?bet*10:bet*2;
        balance+=w; saveBal();
        document.getElementById('status-text').textContent=`Выпало: ${target} (${c==='green'?'Зелёное':c==='red'?'Красное':'Чёрное'}) ${w>0?'+'+w+'₽':'-'+bet+'₽'}`;
        document.getElementById('status-text').style.color=w>0?'#2ed573':'#ff4757';
        selectedColor=null; document.querySelectorAll('.color-btn').forEach(b=>{b.style.border=b.classList.contains('btn-black')?'1px solid #333':'none';});
      }, 5100);
    };

    window.addEventListener('beforeunload', async () => { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } });
    (async () => { await loadAcc(); })();
  </script>
</body>
</html>
