      <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Рулетка</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffa502; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .roulette-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; border-radius: 12px; border: 1px solid #333; margin-bottom: 16px; }
    .wheel-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; transform-origin: center center; }
    canvas { display: block; width: 100%; height: 100%; }
    .indicator { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid white; z-index: 10; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .bet-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .color-btn { padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; text-align: center; }
    .btn-red { background: #ff4757; } .btn-black { background: #000; } .btn-green { background: #00b894; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: right; font-size: 18px; box-sizing: border-box; margin-top: 8px; }
    .btn-spin { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); margin-top: 12px; }
    .btn-spin:disabled { opacity: 0.5; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 150px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>🎡Рулетка</h1>
    <div class="status-text" id="status-text">Загрузка...</div>
    <div class="roulette-wrapper"><div class="indicator"></div><div class="wheel-container" id="wheel"><canvas id="roulette"></canvas></div></div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">0 ₽</span></div>
      <label>Ставка</label>
      <input type="number" id="bet-input" min="1" value="100" />
      <div class="bet-controls">
        <button class="color-btn btn-red" id="btn-red">2x<br>Красное</button>
        <button class="color-btn btn-black" id="btn-black">2x<br>Чёрное</button>
        <button class="color-btn btn-green" id="btn-green">10x<br>Зелёное</button>
      </div>
      <button class="btn-spin" id="btn-spin">Крутить</button>
    </div>
    <div class="history-box" id="history-box">История раундов</div>
  </div>
  <script>
    setTimeout(async function() {
      const BIN_ID = '6a516a15f5f4af5e297ecf15';
      const MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO';
      const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
      let currentUser = localStorage.getItem('currentUser');
      if (!currentUser) { window.location.href = 'index.html'; return; }
      let balance = 1000, bet = 0, isSpinning = false, selectedColor = null, accountsCache = {};
      const SECTORS = 37, sectorColors = [];
      for(let i=0;i<SECTORS;i++){ if(i===0)sectorColors[i]='green'; else if(i%2===0)sectorColors[i]='black'; else sectorColors[i]='red'; }
      async function loadAcc() { try { const r = await fetch(API_URL+'/latest',{headers:{'X-Master-Key':MASTER_KEY}}); const d = await r.json(); accountsCache = d.record||{}; } catch(e) {} }
      async function saveAcc() { try { await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify(accountsCache)}); } catch(e) {} }
      async function updateBal() { if(accountsCache[currentUser]){ accountsCache[currentUser].balance = balance; await saveAcc(); } document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; }
      function resize(){ const s=Math.min(canvas.parentElement.clientWidth,window.innerHeight-250); canvas.width=s; canvas.height=s; drawWheel(); }
      window.addEventListener('resize',resize);
      function drawWheel(){
        const ctx=canvas.getContext('2d'),cx=canvas.width/2,cy=canvas.height/2,r=Math.min(cx,cy)*0.9,tR=r*0.78,sA=(2*Math.PI)/SECTORS;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let i=0;i<SECTORS;i++){ ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,i*sA-Math.PI/2,(i+1)*sA-Math.PI/2); ctx.closePath(); ctx.fillStyle=sectorColors[i]==='green'?'#00b894':sectorColors[i]==='red'?'#ff4757':'#000'; ctx.fill(); ctx.strokeStyle='#111'; ctx.stroke(); }
        ctx.fillStyle='#fff'; ctx.font='bold 16px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
        for(let i=0;i<SECTORS;i++){ const a=i*sA+sA/2-Math.PI/2; ctx.save(); ctx.translate(cx+Math.cos(a)*tR,cy+Math.sin(a)*tR); ctx.rotate(a+Math.PI/2); ctx.fillText(i.toString(),0,0); ctx.restore(); }
        ctx.beginPath(); ctx.arc(cx,cy,r*0.12,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.stroke();
      }
      function setSelected(s,...o){ s.style.border='2px solid #fff'; o.forEach(b=>b.style.border=''); }
      document.getElementById('btn-red').onclick=()=>{selectedColor='red';setSelected(document.getElementById('btn-red'),document.getElementById('btn-black'),document.getElementById('btn-green'));};
      document.getElementById('btn-black').onclick=()=>{selectedColor='black';setSelected(document.getElementById('btn-black'),document.getElementById('btn-red'),document.getElementById('btn-green'));};
      document.getElementById('btn-green').onclick=()=>{selectedColor='green';setSelected(document.getElementById('btn-green'),document.getElementById('btn-red'),document.getElementById('btn-black'));};
      document.getElementById('btn-spin').onclick=()=>{
        if(isSpinning||!selectedColor)return;
        bet=+document.getElementById('bet-input').value;
        if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;}
        isSpinning=true; document.getElementById('btn-spin').disabled=true; balance-=bet; updateBal();
        const target=Math.floor(Math.random()*SECTORS),sAD=(target/SECTORS)*360+(360/SECTORS/2),rot=5+Math.floor(Math.random()*4),tA=rot*360+(360-sAD),st=performance.now();
        function anim(t){ const e=Math.min((t-st)/6000,1),p=1-Math.pow(1-e,3); wheel.style.transform=`rotate(${tA*p}deg)`; if(e<1)requestAnimationFrame(anim); else finish(target); }
        requestAnimationFrame(anim);
      };
      function finish(idx){
        isSpinning=false; document.getElementById('btn-spin').disabled=false;
        const c=sectorColors[idx]; let w=0;
        if(c===selectedColor)w=c==='green'?bet*10:bet*2;
        balance+=w; updateBal();
        document.getElementById('status-text').textContent=`Выпало: ${idx} (${c==='green'?'Зелёное':c==='red'?'Красное':'Чёрное'})`;
        document.getElementById('status-text').style.color=w>0?'#2ed573':'#ff4757';
        selectedColor=null; document.querySelectorAll('.color-btn').forEach(b=>b.style.border='');
      }
      await loadAcc();
      balance=accountsCache[currentUser]?(accountsCache[currentUser].balance||1000):1000;
      updateBal();
      document.getElementById('status-text').textContent='Выберите цвет';
      resize();
    }, 100);
  </script>
</body>
</html>
