<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Пирамида</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    .back-btn:active { transform: scale(0.95); }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .cups-area { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .cup { width: 100px; height: 100px; background: #8B4513; border-radius: 50% 50% 10% 10%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 50px; transition: transform 0.3s, box-shadow 0.3s; border: 3px solid #654321; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
    .cup:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.7); }
    .cup.revealed { transform: translateY(-20px); }
    .cup.winner { box-shadow: 0 0 30px rgba(255,215,0,0.8); border-color: var(--gold); }
    .cup.loser { opacity: 0.5; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .btn-play { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
    .btn-play:active { transform: scale(0.98); }
    .btn-play:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
    .shuffling-text { text-align: center; color: #ffa502; font-size: 16px; margin: 10px 0; min-height: 24px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>🔺 Пирамида</h1>
    <div class="status-text" id="status-text">Найдите приз под чашей! x3 к ставке</div>
    <div class="cups-area" id="cups-area">
      <div class="cup" data-cup="0">🏺</div>
      <div class="cup" data-cup="1">🏺</div>
      <div class="cup" data-cup="2">🏺</div>
    </div>
    <div class="shuffling-text" id="shuffling-text"></div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1 000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <button class="btn-play" id="btn-play">🔺 Играть</button>
    </div>
    <div class="history-box" id="history-box">История игр</div>
  </div>

  <script>
    const balanceEl = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const btnPlay = document.getElementById('btn-play');
    const statusEl = document.getElementById('status-text');
    const historyBox = document.getElementById('history-box');
    const shufflingText = document.getElementById('shuffling-text');
    const cups = document.querySelectorAll('.cup');

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';
    function getCurrentUser() { return localStorage.getItem(CURRENT_USER_KEY); }
    function getUserBalance() { const u = getCurrentUser(); if(!u) return 1000; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) return a[u].balance; } catch(e) {} return 1000; }
    function saveBalance(b) { const u = getCurrentUser(); if(!u) return; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) { a[u].balance = b; localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a)); } } catch(e) {} }
    if(!getCurrentUser()) window.location.href = 'index.html';

    let balance = getUserBalance();
    let isPlaying = false;
    let prizeCup = 0;
    let currentBet = 0;

    function updateBalance() { balanceEl.textContent = `${balance.toLocaleString()} ₽`; }

    function resetCups() {
      cups.forEach(cup => {
        cup.classList.remove('revealed', 'winner', 'loser');
        cup.textContent = '🏺';
      });
      shufflingText.textContent = '';
    }

    btnPlay.addEventListener('click', () => {
      if(isPlaying) return;
      currentBet = Number(betInput.value);
      if(!currentBet || currentBet<=0 || currentBet>balance) { alert('Некорректная ставка'); return; }

      isPlaying = true; btnPlay.disabled = true;
      balance -= currentBet; saveBalance(balance); updateBalance();
      resetCups();
      statusEl.textContent = 'Чаши перемешиваются...'; statusEl.style.color = '#ffa502';
      
      prizeCup = Math.floor(Math.random()*3);
      shufflingText.textContent = '🔄 Перемешивание...';

      cups.forEach(cup => {
        cup.style.pointerEvents = 'none';
      });

      // Анимация перемешивания
      let shuffles = 0;
      const maxShuffles = 10;
      const shuffleInterval = setInterval(() => {
        cups.forEach(cup => {
          cup.style.transform = `translateY(${Math.random()*20-10}px) rotate(${Math.random()*20-10}deg)`;
        });
        shuffles++;
        if(shuffles >= maxShuffles) {
          clearInterval(shuffleInterval);
          cups.forEach(cup => {
            cup.style.transform = '';
            cup.style.pointerEvents = 'auto';
          });
          shufflingText.textContent = '👆 Выберите чашу!';
          
          cups.forEach(cup => {
            cup.onclick = function() {
              if(!isPlaying) return;
              const chosen = parseInt(this.dataset.cup);
              revealCups(chosen);
            };
          });
        }
      }, 200);
    });

    function revealCups(chosen) {
      isPlaying = false; btnPlay.disabled = false;
      cups.forEach(cup => cup.style.pointerEvents = 'none');

      cups.forEach((cup, i) => {
        cup.classList.add('revealed');
        if(i === prizeCup) {
          cup.textContent = '💎';
          cup.classList.add('winner');
        } else {
          cup.textContent = '🪨';
          cup.classList.add('loser');
        }
      });

      const won = chosen === prizeCup;
      const win = won ? currentBet * 3 : 0;
      balance += win; saveBalance(balance); updateBalance();
      
      statusEl.textContent = won ? `Вы нашли алмаз! +${win}₽` : `Там был камень... -${currentBet}₽`;
      statusEl.style.color = won ? '#2ed573' : '#ff4757';
      shufflingText.textContent = won ? '🎉 Поздравляем!' : '😢 Не повезло';
      addHistory(won ? `💎 Алмаз найден: +${win}₽` : `🪨 Камень: -${currentBet}₽`);

      setTimeout(() => {
        resetCups();
        statusEl.textContent = 'Найдите приз под чашей! x3 к ставке';
        statusEl.style.color = '#e0e0e0';
        cups.forEach(cup => cup.style.pointerEvents = 'auto');
      }, 2000);
    }

    function addHistory(t) { const p = document.createElement('div'); p.textContent = t; historyBox.prepend(p); while(historyBox.children.length>20) historyBox.lastChild.remove(); }
    updateBalance();
  </script>
</body>
</html>
