<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Пирамида</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .cups-area { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .cup { width: 100px; height: 100px; background: #8B4513; border-radius: 50% 50% 10% 10%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 50px; transition: transform 0.3s; border: 3px solid #654321; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
    .cup:hover { transform: translateY(-10px); }
    .cup.revealed { transform: translateY(-20px); }
    .cup.winner { box-shadow: 0 0 30px rgba(255,215,0,0.8); }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .btn-play { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
    .btn-play:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .shuffling-text { text-align: center; color: #ffa502; font-size: 16px; margin: 10px 0; min-height: 24px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>🔺 Пирамида</h1>
    <div class="status-text" id="status-text">Загрузка...</div>
    <div class="cups-area"><div class="cup" data-cup="0">🏺</div><div class="cup" data-cup="1">🏺</div><div class="cup" data-cup="2">🏺</div></div>
    <div class="shuffling-text" id="shuffling-text"></div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">0 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <button class="btn-play" id="btn-play">🔺 Играть</button>
    </div>
    <div class="history-box" id="history-box">История игр</div>
  </div>
  <script>
    const BIN_ID = '6a516a15f5f4af5e297ecf15', MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO', API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    
    let balance = 1000, accountsCache = {}, isPlaying = false, prizeCup = 0, currentBet = 0;
    
    async function loadAcc() { try { const r = await fetch(API_URL+'/latest',{headers:{'X-Master-Key':MASTER_KEY}}); const d = await r.json(); accountsCache = d.record||{}; } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify(accountsCache)}); } catch(e) {} }
    async function updateBal() { if(accountsCache[currentUser]){ accountsCache[currentUser].balance = balance; await saveAcc(); } document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; }
    
    function reset(){ document.querySelectorAll('.cup').forEach(c=>{c.classList.remove('revealed','winner');c.textContent='🏺';c.style.pointerEvents='auto';}); document.getElementById('shuffling-text').textContent=''; }
    
    document.getElementById('btn-play').onclick=()=>{
      if(isPlaying)return;
      currentBet=+document.getElementById('bet-input').value;
      if(!currentBet||currentBet<=0||currentBet>balance){alert('Некорректная ставка');return;}
      isPlaying=true; document.getElementById('btn-play').disabled=true; balance-=currentBet; updateBal(); reset();
      prizeCup=Math.floor(Math.random()*3); document.getElementById('shuffling-text').textContent='🔄 Перемешивание...';
      let s=0; const iv=setInterval(()=>{document.querySelectorAll('.cup').forEach(c=>{c.style.transform=`translateY(${Math.random()*20-10}px) rotate(${Math.random()*20-10}deg)`;});s++;if(s>=10){clearInterval(iv);document.querySelectorAll('.cup').forEach(c=>{c.style.transform='';c.onclick=function(){if(!isPlaying)return;reveal(+this.dataset.cup);};});document.getElementById('shuffling-text').textContent='👆 Выберите чашу!';}},200);
    };
    
    function reveal(chosen){
      isPlaying=false; document.getElementById('btn-play').disabled=false;
      document.querySelectorAll('.cup').forEach((c,i)=>{c.classList.add('revealed');c.style.pointerEvents='none';c.textContent=i===prizeCup?'💎':'🪨';if(i===prizeCup)c.classList.add('winner');});
      const won=chosen===prizeCup,win=won?currentBet*3:0; balance+=win; updateBal();
      document.getElementById('status-text').textContent=won?`Алмаз! +${win}₽`:`Камень... -${currentBet}₽`; document.getElementById('status-text').style.color=won?'#2ed573':'#ff4757';
      document.getElementById('shuffling-text').textContent=won?'🎉 Поздравляем!':'😢 Не повезло';
      setTimeout(reset,2000);
    }
    
    (async()=>{await loadAcc();balance=accountsCache[currentUser]?(accountsCache[currentUser].balance||1000):1000;updateBal();document.getElementById('status-text').textContent='Найдите алмаз! x3';})();
  </script>
</body>
</html>
