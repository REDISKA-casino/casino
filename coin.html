<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Орёл и Решка</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .coin-area { display: flex; justify-content: center; align-items: center; margin: 30px 0; height: 160px; perspective: 600px; }
    .coin { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; transition: none; }
    .coin.flipping { animation: flip 1.5s ease-out; }
    @keyframes flip {
      0% { transform: rotateY(0deg); }
      20% { transform: rotateY(360deg) scale(1.2); }
      40% { transform: rotateY(720deg) scale(1.1); }
      60% { transform: rotateY(1080deg) scale(1.05); }
      80% { transform: rotateY(1440deg) scale(1); }
      100% { transform: rotateY(1800deg) scale(1); }
    }
    .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 60px; backface-visibility: hidden; border: 4px solid #b8860b; }
    .coin-front { background: linear-gradient(135deg, #ffd700, #ffaa00); }
    .coin-back { background: linear-gradient(135deg, #ffd700, #ffaa00); transform: rotateY(180deg); }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .choice-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .choice-btn { padding: 16px; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .choice-btn:disabled { opacity: 0.5; }
    .choice-btn.selected { border: 3px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    .btn-eagle { background: #c0392b; } .btn-tail { background: #2980b9; }
    .btn-flip { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
    .btn-flip:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn" onclick="localStorage.setItem('coming_back','true')">← Назад</a></div>
  <div class="game-container">
    <h1>🪙 Орёл и Решка</h1>
    <div class="status-text" id="status-text">Выберите сторону и подбросьте монету</div>
    <div class="coin-area">
      <div class="coin" id="coin">
        <div class="coin-face coin-front">🦅</div>
        <div class="coin-face coin-back">👑</div>
      </div>
    </div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <div class="choice-buttons">
        <button class="choice-btn btn-eagle" id="btn-eagle">🦅 Орёл<br>x2</button>
        <button class="choice-btn btn-tail" id="btn-tail">👑 Решка<br>x2</button>
      </div>
      <button class="btn-flip" id="btn-flip">🪙 Подбросить</button>
    </div>
    <div class="history-box" id="history-box">История бросков</div>
  </div>
  <script>
    const BIN_ID = '6a516a15f5f4af5e297ecf15';
    const MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let selectedChoice = null, isFlipping = false, accountsCache = {};

    async function loadAcc() { try { const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } }); const d = await r.json(); accountsCache = d.record || {}; } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; syncNow(); }
    async function syncNow() { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }
    function addHistory(text) { const box = document.getElementById('history-box'); if(!box) return; const div = document.createElement('div'); div.textContent = text; div.style.padding = '4px 0'; div.style.borderBottom = '1px solid #2a2a2a'; box.insertBefore(div, box.firstChild); while(box.children.length > 20) { box.removeChild(box.lastChild); } }
    document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`;

    document.getElementById('btn-eagle').onclick = () => { if(isFlipping)return; selectedChoice='eagle'; document.getElementById('btn-eagle').classList.add('selected'); document.getElementById('btn-tail').classList.remove('selected'); };
    document.getElementById('btn-tail').onclick = () => { if(isFlipping)return; selectedChoice='tail'; document.getElementById('btn-tail').classList.add('selected'); document.getElementById('btn-eagle').classList.remove('selected'); };

    document.getElementById('btn-flip').onclick = () => {
      if(isFlipping||!selectedChoice) return;
      const bet = +document.getElementById('bet-input').value;
      if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;}
      isFlipping = true;
      document.getElementById('btn-flip').disabled = true;
      document.getElementById('btn-eagle').disabled = true;
      document.getElementById('btn-tail').disabled = true;
      balance -= bet; saveBal();

      const coin = document.getElementById('coin');
      const rand = Math.random() * 100;
      let result;
      if (rand < 1) {
        result = 'edge';
      } else if (rand < 50.5) {
        result = 'eagle';
      } else {
        result = 'tail';
      }

      coin.classList.add('flipping');
      document.getElementById('status-text').textContent = 'Монетка летит...';
      document.getElementById('status-text').style.color = '#ffa502';

      setTimeout(() => {
        coin.classList.remove('flipping');
        
        let won = false, win = 0, displayText = '';
        if (result === 'edge') {
          won = true;
          win = bet * 50;
          displayText = 'РЕБРО! 🌟';
        } else if (result === selectedChoice) {
          won = true;
          win = bet * 2;
          displayText = result === 'eagle' ? 'Орёл! 🦅' : 'Решка! 👑';
        } else {
          displayText = result === 'eagle' ? 'Орёл! 🦅' : 'Решка! 👑';
        }

        balance += win;
        saveBal();
        document.getElementById('status-text').textContent = `${displayText} ${won?'+'+win+'₽':'-'+bet+'₽'}`;
        document.getElementById('status-text').style.color = won ? '#2ed573' : '#ff4757';
        addHistory(`${displayText}: ${won?'+'+win+'₽':'-'+bet+'₽'}`);

        isFlipping = false;
        document.getElementById('btn-flip').disabled = false;
        document.getElementById('btn-eagle').disabled = false;
        document.getElementById('btn-tail').disabled = false;
        document.getElementById('btn-eagle').classList.remove('selected');
        document.getElementById('btn-tail').classList.remove('selected');
        selectedChoice = null;
      }, 1600);
    };

    (async () => { await loadAcc(); })();
  </script>
</body>
  </html>
