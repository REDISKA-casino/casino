<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Плинко</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .board { position: relative; width: 100%; height: 300px; background: #1a1a2e; border-radius: 12px; margin-bottom: 16px; overflow: hidden; border: 2px solid #333; }
    .peg { position: absolute; width: 8px; height: 8px; background: #555; border-radius: 50%; }
    .ball { position: absolute; width: 14px; height: 14px; background: #ff4757; border-radius: 50%; transition: top 0.1s linear, left 0.1s linear; z-index: 2; display: none; box-shadow: 0 0 10px rgba(255,71,87,0.8); }
    .slot { position: absolute; bottom: 0; height: 40px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; color: #fff; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .btn-drop { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
    .btn-drop:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn" onclick="localStorage.setItem('coming_back','true')">← Назад</a></div>
  <div class="game-container">
    <h1>🎯 Плинко</h1>
    <div class="status-text" id="status-text">Сделайте ставку и бросьте шарик</div>
    <div class="board" id="board">
      <div class="ball" id="ball"></div>
    </div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <button class="btn-drop" id="btn-drop">🔴 Бросить шарик</button>
    </div>
    <div class="history-box" id="history-box">История бросков</div>
  </div>
  <script>
    const BIN_ID = '6a516a15f5f4af5e297ecf15';
    const MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let isDropping = false, accountsCache = {};
    const COLS = 7, ROWS = 8;
    const multipliers = [0.5, 1, 2, 5, 2, 1, 0.5];
    const colors = ['#333','#444','#ffa502','#ff4757','#ffa502','#444','#333'];

    async function loadAcc() { try { const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } }); const d = await r.json(); accountsCache = d.record || {}; } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; syncNow(); }
    async function syncNow() { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }
    function addHistory(text) { const box = document.getElementById('history-box'); if(!box) return; const div = document.createElement('div'); div.textContent = text; div.style.padding = '4px 0'; div.style.borderBottom = '1px solid #2a2a2a'; box.insertBefore(div, box.firstChild); while(box.children.length > 20) { box.removeChild(box.lastChild); } }
    document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`;

    const board = document.getElementById('board');
    const ball = document.getElementById('ball');
    const cols = COLS, rows = ROWS;
    const marginX = 20, marginTop = 30;
    const spacingX = (board.clientWidth - marginX*2) / (cols - 1);
    const spacingY = (220 - marginTop) / rows;

    for(let r=0; r<rows; r++){
      const pegsInRow = r%2===0 ? cols-1 : cols;
      const offsetX = r%2===0 ? spacingX/2 : 0;
      for(let c=0; c<pegsInRow; c++){
        const peg = document.createElement('div');
        peg.className = 'peg';
        peg.style.left = (marginX + offsetX + c*spacingX - 4) + 'px';
        peg.style.top = (marginTop + r*spacingY - 4) + 'px';
        board.appendChild(peg);
      }
    }

    const slotWidth = (board.clientWidth - marginX*2) / cols;
    for(let c=0; c<cols; c++){
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.style.left = (marginX + c*slotWidth) + 'px';
      slot.style.width = slotWidth + 'px';
      slot.style.background = colors[c];
      slot.textContent = 'x' + multipliers[c];
      board.appendChild(slot);
    }

    document.getElementById('btn-drop').onclick = () => {
      if(isDropping) return;
      const bet = +document.getElementById('bet-input').value;
      if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;}
      isDropping = true;
      document.getElementById('btn-drop').disabled = true;
      balance -= bet; saveBal();
      
      const targetCol = Math.floor(Math.random()*cols);
      let posX = marginX + targetCol*slotWidth + slotWidth/2 - 7;
      let posY = 0;
      ball.style.display = 'block';
      ball.style.left = posX + 'px';
      ball.style.top = posY + 'px';
      
      const steps = rows*2;
      let step = 0;
      let currentCol = targetCol;
      for(let i=0;i<rows;i++){
        if(Math.random()>0.5) currentCol = Math.min(cols-1, currentCol+1);
        else currentCol = Math.max(0, currentCol-1);
      }
      
      const interval = setInterval(() => {
        step++;
        posY = marginTop + (step/steps)*220;
        const r = Math.floor((posY-marginTop)/spacingY);
        if(r<rows && Math.random()>0.5) posX += (Math.random()-0.5)*spacingX*0.8;
        posX = Math.max(marginX, Math.min(board.clientWidth-marginX-14, posX));
        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';
        
        if(step >= steps){
          clearInterval(interval);
          const landedCol = Math.floor((posX-marginX)/slotWidth);
          const mult = multipliers[Math.min(Math.max(landedCol,0),cols-1)];
          const win = Math.floor(bet*mult);
          balance += win; saveBal();
          document.getElementById('status-text').textContent = `Выпало: x${mult}! ${win>bet?'+'+win+'₽':win>0?'+'+win+'₽':'-'+bet+'₽'}`;
          document.getElementById('status-text').style.color = win>=bet?'#2ed573':'#ff4757';
          addHistory(`Плинко x${mult}: ${win>0?'+'+win+'₽':'-'+bet+'₽'}`);
          setTimeout(() => { ball.style.display='none'; isDropping=false; document.getElementById('btn-drop').disabled=false; }, 500);
        }
      }, 30);
    };

    (async () => { await loadAcc(); })();
  </script>
</body>
</html>
