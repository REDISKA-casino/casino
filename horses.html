<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Скачки</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .track { background: #2d5a1e; border-radius: 12px; padding: 8px; margin-bottom: 16px; border: 2px solid #444; }
    .lane { display: flex; align-items: center; height: 40px; margin: 4px 0; background: rgba(0,0,0,0.3); border-radius: 6px; position: relative; overflow: hidden; }
    .horse { font-size: 28px; position: absolute; transition: left 0.1s linear; left: 0; } .finish { position: absolute; right: 10px; color: #fff; font-weight: bold; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .horse-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .horse-btn { padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; justify-content: center; } .horse-btn.selected { border: 2px solid #fff; }
    .horse-btn:disabled { opacity: 0.5; }
    .btn-race { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); } .btn-race:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn" onclick="localStorage.setItem('coming_back','true')">← Назад</a></div>
  <div class="game-container"><h1>🐴 Скачки</h1>
    <div class="status-text" id="status-text">Выберите лошадь</div>
    <div class="track"><div class="lane"><span class="horse" id="horse1">🐴</span><span class="finish">🏁</span></div><div class="lane"><span class="horse" id="horse2">🐎</span><span class="finish">🏁</span></div><div class="lane"><span class="horse" id="horse3">🦄</span><span class="finish">🏁</span></div><div class="lane"><span class="horse" id="horse4">🐴</span><span class="finish">🏁</span></div></div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <div class="horse-buttons">
        <button class="horse-btn" data-horse="1" style="background:#8B4513;">🐴 Лошадь 1<br>x3</button>
        <button class="horse-btn" data-horse="2" style="background:#2c2c2c;">🐎 Лошадь 2<br>x2.5</button>
        <button class="horse-btn" data-horse="3" style="background:#7B68EE;">🦄 Единорог<br>x5</button>
        <button class="horse-btn" data-horse="4" style="background:#CD853F;">🐴 Лошадь 4<br>x2</button>
      </div>
      <button class="btn-race" id="btn-race">🏇 На старт!</button>
    </div>
    <div class="history-box" id="history-box">История забегов</div>
  </div>
  <script>
    const BIN_ID = '6a516a15f5f4af5e297ecf15';
    const MASTER_KEY = '$2a$10$ESWoAwK.zv8By8WZCjzhu.zw1AIOFcUeILyVjiDrHmv62jIxygKoO';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let selectedHorse = null, isRacing = false, accountsCache = {}, syncTimer = null;
    const multipliers = {1:3,2:2.5,3:5,4:2};

    async function loadAcc() { try { const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } }); const d = await r.json(); accountsCache = d.record || {}; } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; scheduleSync(); }
    function scheduleSync() { if (syncTimer) clearTimeout(syncTimer); syncTimer = setTimeout(async () => { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }, 5000); }
    document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`;

    document.querySelectorAll('.horse-btn').forEach(b=>b.addEventListener('click',()=>{if(isRacing)return;document.querySelectorAll('.horse-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selectedHorse=+b.dataset.horse;}));

    document.getElementById('btn-race').onclick=()=>{
      if(isRacing||!selectedHorse)return;
      const bet=+document.getElementById('bet-input').value;
      if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;}
      isRacing=true; document.getElementById('btn-race').disabled=true; document.querySelectorAll('.horse-btn').forEach(b=>b.disabled=true);
      balance-=bet; saveBal();
      for(let i=1;i<=4;i++) document.getElementById('horse'+i).style.left='0px';
      const winner = Math.floor(Math.random()*4)+1;
      const finishTime = 3000 + Math.random()*2000;
      const startTime = Date.now();
      const race = setInterval(()=>{
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed/finishTime, 1);
        const trackWidth = document.querySelector('.lane').clientWidth - 50;
        for(let i=1;i<=4;i++){ let pos; if(i===winner){ pos = progress * trackWidth; } else { pos = (progress - Math.random()*0.1) * trackWidth; if(pos < 0) pos = 0; if(pos > trackWidth) pos = trackWidth - 10; } document.getElementById('horse'+i).style.left = pos + 'px'; }
        if(progress >= 1){ clearInterval(race); const won = winner === selectedHorse; const win = won ? Math.floor(bet*multipliers[selectedHorse]) : 0; balance+=win; saveBal(); document.getElementById('status-text').textContent=won?`Лошадь ${winner} победила! +${win}₽`:`Лошадь ${winner} победила. -${bet}₽`; document.getElementById('status-text').style.color=won?'#2ed573':'#ff4757'; isRacing=false; document.getElementById('btn-race').disabled=false; document.querySelectorAll('.horse-btn').forEach(b=>b.disabled=false); }
      }, 50);
    };

    window.addEventListener('beforeunload', async () => { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } });
    (async () => { await loadAcc(); })();
  </script>
</body>
</html>
