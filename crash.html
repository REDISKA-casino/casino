<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Обвал</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffa502; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; margin-top: 16px; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: right; font-size: 18px; box-sizing: border-box; margin-top: 8px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:active { transform: scale(0.98); } button:disabled { opacity: 0.5; }
    .btn-bet { background: var(--accent); color: white; margin-top: 12px; }
    .btn-cashout { background: var(--success); color: white; display: none; margin-top: 12px; }
    .graph-wrapper { position: relative; width: 100%; height: 240px; overflow: hidden; background: #000; border-radius: 12px; border: 1px solid #333; }
    canvas { display: block; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 150px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>📈Обвал</h1>
    <div class="status-text" id="status-text">Готов к игре</div>
    <div class="graph-wrapper" id="graph-wrapper"><canvas id="graph"></canvas></div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1000 ₽</span></div>
      <label>Ставка</label>
      <input type="number" id="bet-input" min="1" value="100" />
      <button class="btn-bet" id="btn-start">Сделать ставку</button>
      <button class="btn-cashout" id="btn-cashout">Вывести</button>
    </div>
    <div class="history-box" id="history-box">История раундов</div>
  </div>
  <script>
    const API_URL = 'https://lucky-finger.onrender.com';
    let currentUser = localStorage.getItem('currentUser');
    if (!currentUser) { window.location.href = 'index.html'; }
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let bet = 0, isPlaying = false, crashMultiplier = 0, currentMultiplier = 1, animationFrameId;
    const MAX_CRASH = 10, SPEED_MULTIPLIER = 0.010;
    let accountsCache = {};

    async function loadAcc() { try { const r = await fetch(API_URL); accountsCache = await r.json(); } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; syncWithCloud(); }
    async function syncWithCloud() { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }
    document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`;

    function resize() { const c=document.getElementById('graph'),w=document.getElementById('graph-wrapper').clientWidth,h=document.getElementById('graph-wrapper').clientHeight,dpr=window.devicePixelRatio||1; c.width=w*dpr; c.height=h*dpr; c.style.width=w+'px'; c.style.height=h+'px'; c.getContext('2d').setTransform(dpr,0,0,dpr,0,0); }
    window.addEventListener('resize',resize); resize();

    document.getElementById('btn-start').onclick = () => { if(isPlaying)return; bet=+document.getElementById('bet-input').value; if(!bet||bet<=0||bet>balance){alert('Некорректная ставка');return;} startRound(); };
    document.getElementById('btn-cashout').onclick = () => { if(isPlaying) endRound(true); };

    function startRound() { isPlaying=true; document.getElementById('bet-input').disabled=true; document.getElementById('btn-start').style.display='none'; document.getElementById('btn-cashout').style.display='block'; document.getElementById('status-text').textContent='Игра идёт…'; document.getElementById('status-text').style.color='#ffa502'; balance-=bet; saveBal(); crashMultiplier=1+9*Math.pow(Math.random(),3); currentMultiplier=1; drawGraph(); }

    function drawGraph() {
      const c=document.getElementById('graph'),ctx=c.getContext('2d'),w=document.getElementById('graph-wrapper').clientWidth,h=c.height/(window.devicePixelRatio||1);
      ctx.clearRect(0,0,w,h); const vM=20,uH=h-vM*2,sX=w/MAX_CRASH,sY=uH/MAX_CRASH;
      ctx.strokeStyle='#333'; ctx.lineWidth=1;
      for(let m=0;m<=MAX_CRASH;m++){ctx.beginPath();ctx.moveTo(m*sX,0);ctx.lineTo(m*sX,h);ctx.stroke();ctx.beginPath();ctx.moveTo(0,h-m*sY-vM);ctx.lineTo(w,h-m*sY-vM);ctx.stroke();}
      ctx.fillStyle='#444';ctx.font='11px system-ui';ctx.textAlign='right';
      for(let m=1;m<=MAX_CRASH;m++)ctx.fillText(m.toFixed(1),16,h-m*sY-vM+4);
      ctx.strokeStyle='#2ed573';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,h-vM);
      function animate(){if(!isPlaying)return;currentMultiplier+=SPEED_MULTIPLIER;if(currentMultiplier>=crashMultiplier){endRound(false);return;}ctx.lineTo(currentMultiplier*sX,h-currentMultiplier*sY-vM);ctx.stroke();animationFrameId=requestAnimationFrame(animate);}
      animationFrameId=requestAnimationFrame(animate);
    }

    function endRound(won){ isPlaying=false; cancelAnimationFrame(animationFrameId); document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cashout').style.display='none'; document.getElementById('bet-input').disabled=false;
      if(won){ const w=Math.floor(bet*currentMultiplier); balance+=w; document.getElementById('status-text').textContent=`Выведено: ${currentMultiplier.toFixed(2)}x`; document.getElementById('status-text').style.color='#2ed573'; }
      else { document.getElementById('status-text').textContent=`Обвал на ${crashMultiplier.toFixed(2)}x`; document.getElementById('status-text').style.color='#ff4757'; }
      saveBal(); }

    (async () => { await loadAcc(); })();
  </script>
</body>
</html>
