<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Обвал</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1e1e1e;
      --text: #e0e0e0;
      --accent: #ff4757;
      --success: #2ed573;
      --gold: #ffa502;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      padding: 16px 16px 0 16px;
      gap: 12px;
    }
    .back-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:active { transform: scale(0.95); }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container {
      width: 100%;
      max-width: 500px;
      padding: 16px;
    }
    .controls-box {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin-top: 16px;
    }
    .balance-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      padding: 8px 0;
      margin-bottom: 12px;
      font-size: 18px;
      border: none;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: #fff;
      text-align: right;
      font-size: 18px;
      box-sizing: border-box;
      margin-top: 8px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-bet { background: var(--accent); color: white; margin-top: 12px; }
    .btn-cashout { background: var(--success); color: white; display: none; margin-top: 12px; }
    .graph-wrapper {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      background: #000;
      border-radius: 12px;
      border: 1px solid #333;
      touch-action: none;
    }
    canvas {
      display: block;
      image-rendering: auto;
    }
    .status-text {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
      min-height: 28px;
    }
    .history-box {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">← Назад</a>
  </div>
  <div class="game-container">
    <h1>📈Обвал</h1>
    <div class="status-text" id="status-text">Готов к игре</div>
    <div class="graph-wrapper" id="graph-wrapper">
      <canvas id="graph"></canvas>
    </div>
    <div class="controls-box">
      <div class="balance-box">
        <span>Баланс</span>
        <span id="balance-display">1 000 ₽</span>
      </div>
      <label style="display:block; margin-bottom:6px;">Ставка</label>
      <input type="number" id="bet-input" min="1" value="100" />
      <button class="btn-bet" id="btn-start">Сделать ставку</button>
      <button class="btn-cashout" id="btn-cashout">Вывести</button>
    </div>
    <div class="history-box" id="history-box">История раундов</div>
  </div>
  <script>
    const balanceEl = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const btnStart = document.getElementById('btn-start');
    const btnCashout = document.getElementById('btn-cashout');
    const statusEl = document.getElementById('status-text');
    const graphWrapper = document.getElementById('graph-wrapper');
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const historyBox = document.getElementById('history-box');

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';

    function getCurrentUser() {
      return localStorage.getItem(CURRENT_USER_KEY);
    }

    function getUserBalance() {
      const currentUser = getCurrentUser();
      if (!currentUser) return 1000;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          return accounts[currentUser].balance;
        }
      } catch(e) {}
      return 1000;
    }

    function saveBalance(newBalance) {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          accounts[currentUser].balance = newBalance;
          localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
        }
      } catch(e) {}
    }

    if (!getCurrentUser()) {
      window.location.href = 'index.html';
    }

    let balance = getUserBalance();
    
    let bet = 0;
    let isPlaying = false;
    let crashMultiplier = 0;
    let currentMultiplier = 1;
    let animationFrameId;

    const MAX_CRASH = 10;
    const SPEED_MULTIPLIER = 0.010;

    function updateBalanceAndSave() {
      saveBalance(balance);
      updateBalanceDisplay();
    }

    function resize() {
      const w = graphWrapper.clientWidth;
      const h = graphWrapper.clientHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!isPlaying) drawStaticGrid();
    }
    window.addEventListener('resize', resize);
    resize();

    function drawStaticGrid() {
      const w = graphWrapper.clientWidth;
      const h = canvas.height / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, w, h);
      
      const vMargin = 20;
      const usableH = h - vMargin * 2;
      const scaleX = w / MAX_CRASH;
      const scaleY = usableH / MAX_CRASH;

      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;

      for (let m = 0; m <= MAX_CRASH; m += 1) {
        const x = m * scaleX;
        const y = h - m * scaleY - vMargin;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.fillStyle = '#444';
      ctx.font = '11px system-ui';
      ctx.textAlign = 'right';
      for (let m = 1; m <= MAX_CRASH; m += 1) {
        const y = h - m * scaleY - vMargin + 4;
        ctx.fillText(m.toFixed(1), 16, y);
      }
    }

    btnStart.addEventListener('click', () => {
      if (isPlaying) return;
      bet = Number(betInput.value);
      if (!bet || bet <= 0 || bet > balance) {
        alert('Некорректная ставка или недостаточно средств');
        return;
      }
      startRound();
    });

    btnCashout.addEventListener('click', cashout);

    function getWeightedCrash() {
      let r = Math.random();
      r = Math.pow(r, 3);
      const MIN_CRASH = 1;
      return MIN_CRASH + (MAX_CRASH - MIN_CRASH) * r;
    }

    function startRound() {
      isPlaying = true;
      betInput.disabled = true;
      btnStart.style.display = 'none';
      btnCashout.style.display = 'block';
      statusEl.textContent = 'Игра идёт…';
      statusEl.style.color = '#ffa502';
      balance -= bet;
      updateBalanceAndSave();
      crashMultiplier = getWeightedCrash();
      currentMultiplier = 1;
      drawGraph();
    }

    function drawGraph() {
      const w = graphWrapper.clientWidth;
      const h = canvas.height / (window.devicePixelRatio || 1);
      
      ctx.clearRect(0, 0, w, h);
      
      const vMargin = 20;
      const usableH = h - vMargin * 2;
      const scaleX = w / MAX_CRASH;
      const scaleY = usableH / MAX_CRASH;

      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;

      for (let m = 0; m <= MAX_CRASH; m += 1) {
        const x = m * scaleX;
        const y = h - m * scaleY - vMargin;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.fillStyle = '#444';
      ctx.font = '11px system-ui';
      ctx.textAlign = 'right';
      for (let m = 1; m <= MAX_CRASH; m += 1) {
        const y = h - m * scaleY - vMargin + 4;
        ctx.fillText(m.toFixed(1), 16, y);
      }

      ctx.strokeStyle = '#2ed573';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, h - vMargin);

      function animate() {
        if (!isPlaying) return;
        currentMultiplier += SPEED_MULTIPLIER;
        if (currentMultiplier >= crashMultiplier) {
          endRound(false);
          return;
        }

        const newX = currentMultiplier * scaleX;
        const newY = h - currentMultiplier * scaleY - vMargin;

        ctx.lineTo(newX, newY);
        ctx.stroke();

        animationFrameId = requestAnimationFrame(animate);
      }
      animationFrameId = requestAnimationFrame(animate);
    }

    function cashout() {
      if (!isPlaying) return;
      endRound(true);
    }

    function endRound(cashedOut) {
      isPlaying = false;
      cancelAnimationFrame(animationFrameId);
      btnStart.style.display = 'block';
      btnCashout.style.display = 'none';
      betInput.disabled = false;

      if (cashedOut) {
        const win = Math.floor(bet * currentMultiplier);
        balance += win;
        statusEl.textContent = `Выведено: ${currentMultiplier.toFixed(2)}x`;
        statusEl.style.color = '#2ed573';
        addToHistory(`Победа: ${win} ₽ (${currentMultiplier.toFixed(2)}x)`);
      } else {
        statusEl.textContent = `Обвал на ${crashMultiplier.toFixed(2)}x`;
        statusEl.style.color = '#ff4757';
        addToHistory(`Проигрыш: ${bet} ₽`);
      }
      updateBalanceAndSave();
      drawStaticGrid();
    }

    function updateBalanceDisplay() {
      balanceEl.textContent = `${balance.toLocaleString()} ₽`;
    }

    function addToHistory(text) {
      const p = document.createElement('div');
      p.textContent = text;
      historyBox.prepend(p);
      while (historyBox.children.length > 20) {
        historyBox.lastChild.remove();
      }
    }

    updateBalanceDisplay();
  </script>
</body>
</html>
