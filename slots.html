<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Слоты 777</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1e1e1e;
      --text: #e0e0e0;
      --accent: #ff4757;
      --gold: #ffd700;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      padding: 16px 16px 0 16px;
      gap: 12px;
    }
    .back-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:active { transform: scale(0.95); }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container {
      width: 100%;
      max-width: 500px;
      padding: 16px;
    }
    .slots-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      background: #2a2a2a;
      border-radius: 12px;
      border: 2px solid #444;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }
    .bonus-effect {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      display: none;
    }
    .bonus-effect.active {
      display: block;
      animation: bonusFlash 0.8s ease-out;
    }
    @keyframes bonusFlash {
      0% { background: rgba(255,215,0,0.6); }
      50% { background: rgba(255,107,107,0.4); }
      100% { background: transparent; }
    }
    .bonus-particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 6;
    }
    .particle {
      position: absolute;
      font-size: 30px;
      animation: fall linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .reel-container {
      display: flex;
      height: 100%;
      background: #000;
      border: 1px solid #333;
      position: relative;
    }
    .reel-separator {
      width: 3px;
      background: #555;
      z-index: 10;
    }
    .reel {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }
    .reel-content {
      display: flex;
      flex-direction: column;
    }
    .symbol {
      height: calc(100vw / 3 * 2 / 3);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      user-select: none;
      flex-shrink: 0;
    }
    .sym-cherry { color: #ff5252; }
    .sym-lemon { color: #ffcc00; }
    .sym-bell { color: #ffd700; }
    .sym-bar { color: #ccc; text-shadow: none; }
    .sym-7 { color: #ff0000; font-weight: 900; font-size: 56px; text-shadow: 0 0 15px #ff0000, 0 0 30px rgba(255,0,0,0.5); }
    .sym-bonus { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; animation: glow 1s infinite; }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 10px #ff6b6b; }
      50% { text-shadow: 0 0 25px #ff6b6b, 0 0 50px #ff4757; }
    }

    .status-text {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
      min-height: 28px;
    }
    .controls-box {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    .balance-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      margin-bottom: 12px;
      font-size: 18px;
    }
    .bonus-indicator {
      color: #ff6b6b;
      font-size: 14px;
      margin-bottom: 8px;
      min-height: 20px;
      font-weight: bold;
    }
    .paylines-info {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
      text-align: left;
      line-height: 1.4;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: #fff;
      text-align: right;
      font-size: 18px;
      box-sizing: border-box;
      margin-top: 8px;
    }
    .btn-spin {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      color: white;
      margin-top: 12px;
      font-weight: bold;
    }
    .btn-spin:active { transform: scale(0.98); }
    .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-normal { background: var(--accent); }
    .btn-bonus { background: #ff6b6b; animation: pulse-btn 1s infinite; }
    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 0 10px rgba(255,107,107,0.5); }
      50% { box-shadow: 0 0 30px rgba(255,107,107,0.9); }
    }
    .history-box {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">← Назад</a>
  </div>
  <div class="game-container">
    <h1>🎰 Слоты 777</h1>
    <div class="status-text" id="status-text">Сделайте ставку и крутите!</div>

    <div class="slots-wrapper" id="slots-wrapper">
      <div class="bonus-effect" id="bonus-effect"></div>
      <div class="bonus-particles" id="bonus-particles"></div>
      <div class="reel-container" id="reel-container">
        <div class="reel" id="reel1">
          <div class="reel-content" id="content1"></div>
        </div>
        <div class="reel-separator"></div>
        <div class="reel" id="reel2">
          <div class="reel-content" id="content2"></div>
        </div>
        <div class="reel-separator"></div>
        <div class="reel" id="reel3">
          <div class="reel-content" id="content3"></div>
        </div>
      </div>
    </div>

    <div class="controls-box">
      <div class="balance-box">
        <span>Баланс</span>
        <span id="balance-display">1 000 ₽</span>
      </div>
      <div class="bonus-indicator" id="bonus-indicator"></div>
      <label style="display:block; margin-bottom:6px;">Ставка на линию</label>
      <input type="number" id="bet-input" min="1" value="100" />
      <button class="btn-spin btn-normal" id="btn-spin">🎰 КРУТИТЬ</button>
      <div class="paylines-info">
        🎯 Комбинации:<br>
        • Горизонталь (3 в ряд) = x2<br>
        • Вертикаль (3 в столбец) = x2<br>
        • Диагональ (↘↗) = x2<br>
        • 777 (любая линия) = x20<br>
        • 3 бонуса (любая линия) = x3 + 5 фриспинов
      </div>
    </div>

    <div class="history-box" id="history-box">История раундов</div>
  </div>

  <script>
    const balanceEl = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const btnSpin = document.getElementById('btn-spin');
    const statusEl = document.getElementById('status-text');
    const historyBox = document.getElementById('history-box');
    const bonusIndicator = document.getElementById('bonus-indicator');
    const bonusEffect = document.getElementById('bonus-effect');
    const bonusParticles = document.getElementById('bonus-particles');

    const symbols = [
      { icon: '🍒', cls: 'sym-cherry', weight: 25 },
      { icon: '🍋', cls: 'sym-lemon', weight: 25 },
      { icon: '🔔', cls: 'sym-bell', weight: 20 },
      { icon: '✉️', cls: 'sym-bar', weight: 15 },
      { icon: '7', cls: 'sym-7', weight: 10 },
      { icon: '💎', cls: 'sym-bonus', weight: 5 }
    ];

    const TOTAL_SYMBOLS = 30;
    const VISIBLE_SYMBOLS = 3;
    const SPIN_DURATION = 2000;
    const STOP_DELAY = 10;

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';

    function getCurrentUser() { return localStorage.getItem(CURRENT_USER_KEY); }
    function getUserBalance() { const u = getCurrentUser(); if(!u) return 1000; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) return a[u].balance; } catch(e) {} return 1000; }
    function saveBalance(b) { const u = getCurrentUser(); if(!u) return; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) { a[u].balance = b; localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a)); } } catch(e) {} }
    if(!getCurrentUser()) window.location.href = 'index.html';

    let balance = getUserBalance();
    let bet = 0;
    let isSpinning = false;
    let bonusSpins = 0;

    function getWeightedSymbol() {
      const total = symbols.reduce((s, sym) => s + sym.weight, 0);
      let r = Math.random() * total;
      for (const sym of symbols) {
        r -= sym.weight;
        if (r <= 0) return sym;
      }
      return symbols[0];
    }

    function updateBalanceAndSave() { saveBalance(balance); updateBalanceDisplay(); }

    function updateBonusIndicator() {
      if (bonusSpins > 0) {
        bonusIndicator.textContent = `🔥 Бесплатных вращений: ${bonusSpins}`;
        btnSpin.textContent = '🎁 КРУТИТЬ БЕСПЛАТНО';
        btnSpin.className = 'btn-spin btn-bonus';
      } else {
        bonusIndicator.textContent = '';
        btnSpin.textContent = '🎰 КРУТИТЬ';
        btnSpin.className = 'btn-spin btn-normal';
      }
    }

    function triggerBonusEffect() {
      bonusEffect.classList.add('active');
      const particles = ['💎','✨','🌟','💫','🎉','🎊','💎','✨','🌟','💫'];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = particles[Math.floor(Math.random() * particles.length)];
        p.style.left = Math.random() * 90 + '%';
        p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        p.style.animationDelay = Math.random() * 0.5 + 's';
        p.style.fontSize = (20 + Math.random() * 30) + 'px';
        bonusParticles.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }
      setTimeout(() => bonusEffect.classList.remove('active'), 800);
    }

    function generateReelContent() {
      let html = '';
      for (let i = 0; i < TOTAL_SYMBOLS; i++) {
        const s = getWeightedSymbol();
        html += `<div class="symbol ${s.cls}">${s.icon}</div>`;
      }
      return html;
    }

    function initReels() {
      document.getElementById('content1').innerHTML = generateReelContent();
      document.getElementById('content2').innerHTML = generateReelContent();
      document.getElementById('content3').innerHTML = generateReelContent();
      setReelPosition(document.getElementById('content1'), 0);
      setReelPosition(document.getElementById('content2'), 0);
      setReelPosition(document.getElementById('content3'), 0);
    }

    function setReelPosition(content, targetIndex) {
      const symbolHeight = content.children[0].offsetHeight;
      const offset = -targetIndex * symbolHeight;
      content.style.transform = `translateY(${offset}px)`;
    }

    function getGrid() {
      const contents = [document.getElementById('content1'), document.getElementById('content2'), document.getElementById('content3')];
      const grid = [];
      for (let col = 0; col < 3; col++) {
        const stopIndex = Number(contents[col].dataset.stopIndex);
        grid[col] = [];
        for (let row = 0; row < VISIBLE_SYMBOLS; row++) {
          const el = contents[col].children[stopIndex + row];
          const cls = el.className.split(' ').find(c => c.startsWith('sym-'));
          grid[col][row] = cls;
        }
      }
      return grid;
    }

    function checkWins(grid) {
      const wins = [];
      
      for (let row = 0; row < 3; row++) {
        if (grid[0][row] && grid[0][row] === grid[1][row] && grid[1][row] === grid[2][row]) {
          wins.push({ type: 'horizontal', row: row, cls: grid[0][row], mult: grid[0][row] === 'sym-7' ? 20 : grid[0][row] === 'sym-bonus' ? 3 : 2 });
        }
      }
      
      for (let col = 0; col < 3; col++) {
        if (grid[col][0] && grid[col][0] === grid[col][1] && grid[col][1] === grid[col][2]) {
          wins.push({ type: 'vertical', col: col, cls: grid[col][0], mult: grid[col][0] === 'sym-7' ? 20 : grid[col][0] === 'sym-bonus' ? 3 : 2 });
        }
      }
      
      if (grid[0][0] && grid[0][0] === grid[1][1] && grid[1][1] === grid[2][2]) {
        wins.push({ type: 'diagonal_down', cls: grid[0][0], mult: grid[0][0] === 'sym-7' ? 20 : grid[0][0] === 'sym-bonus' ? 3 : 2 });
      }
      
      if (grid[0][2] && grid[0][2] === grid[1][1] && grid[1][1] === grid[2][0]) {
        wins.push({ type: 'diagonal_up', cls: grid[0][2], mult: grid[0][2] === 'sym-7' ? 20 : grid[0][2] === 'sym-bonus' ? 3 : 2 });
      }
      
      return { wins };
    }

    btnSpin.addEventListener('click', () => {
      if (isSpinning) return;
      
      const freeSpin = bonusSpins > 0;
      
      if (!freeSpin) {
        bet = Number(betInput.value);
        if (!bet || bet <= 0 || bet > balance) { alert('Некорректная ставка или недостаточно средств'); return; }
        balance -= bet;
        updateBalanceAndSave();
      } else {
        bonusSpins--;
        updateBonusIndicator();
      }

      isSpinning = true;
      betInput.disabled = true;
      btnSpin.disabled = true;
      statusEl.textContent = freeSpin ? 'Бонусное вращение!' : 'Крутим барабаны…';
      statusEl.style.color = '#ffa502';

      const contents = [document.getElementById('content1'), document.getElementById('content2'), document.getElementById('content3')];
      const stopIndices = [];
      for (let i = 0; i < 3; i++) {
        stopIndices.push(Math.floor(Math.random() * (TOTAL_SYMBOLS - VISIBLE_SYMBOLS)));
      }

      contents.forEach((c, idx) => {
        c.style.transition = 'none';
        c.style.transform = 'translateY(0px)';
        void c.offsetWidth;
        const totalDuration = SPIN_DURATION + (idx * STOP_DELAY);
        c.style.transition = `transform ${totalDuration / 1000}s cubic-bezier(0.2, 0.8, 0.2, 1)`;
        const symbolHeight = c.children[0].offsetHeight;
        c.style.transform = `translateY(${-stopIndices[idx] * symbolHeight}px)`;
        c.dataset.stopIndex = stopIndices[idx];
      });

      setTimeout(() => {
        isSpinning = false;
        betInput.disabled = false;
        btnSpin.disabled = false;

        const grid = getGrid();
        const { wins } = checkWins(grid);

        let bonusFromWins = false;
        wins.forEach(w => {
          if (w.cls === 'sym-bonus') bonusFromWins = true;
        });

        if (bonusFromWins) {
          bonusSpins += 5;
          triggerBonusEffect();
          addToHistory('💎 Бонусная линия! +5 фриспинов');
        }

        updateBonusIndicator();

        let totalWin = 0;
        let resultText = '';
        let color = '#fff';

        if (wins.length > 0) {
          const descs = [];
          wins.forEach(w => {
            let desc = '';
            if (w.type === 'horizontal') desc = `Линия ${w.row + 1}`;
            else if (w.type === 'vertical') desc = `Столбец ${w.col + 1}`;
            else if (w.type === 'diagonal_down') desc = 'Диагональ ↘';
            else if (w.type === 'diagonal_up') desc = 'Диагональ ↗';
            const wa = (freeSpin ? bet : bet) * w.mult;
            totalWin += wa;
            descs.push(`${desc} x${w.mult}`);
          });
          resultText = `Выигрыш: ${descs.join(' + ')}`;
          color = '#2ed573';
        } else {
          resultText = freeSpin ? 'Бесплатное вращение' : 'Не повезло. Попробуйте ещё раз.';
          color = freeSpin ? '#ffa502' : '#ff4757';
        }

        balance += totalWin;
        updateBalanceAndSave();
        if (!(bonusSpins > 0)) {
          statusEl.textContent = resultText;
          statusEl.style.color = color;
        } else {
          statusEl.textContent = resultText + ' | 🔥 Бонус!';
          statusEl.style.color = '#ff6b6b';
        }
        addToHistory(totalWin > 0 ? `Победа: ${totalWin} ₽` : `Проигрыш: ${freeSpin ? 0 : bet} ₽`);
      }, SPIN_DURATION + (2 * STOP_DELAY) + 100);
    });

    function updateBalanceDisplay() { balanceEl.textContent = `${balance.toLocaleString()} ₽`; }
    function addHistory(t) { const p = document.createElement('div'); p.textContent = t; historyBox.prepend(p); while(historyBox.children.length>20) historyBox.lastChild.remove(); }

    window.addEventListener('load', () => { initReels(); updateBalanceDisplay(); updateBonusIndicator(); });
    window.addEventListener('resize', () => { if(!isSpinning) initReels(); });
  </script>
</body>
</html>
