<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Кости</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --success: #2ed573; --gold: #ffd700; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    .back-btn:active { transform: scale(0.95); }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .dice-area { display: flex; justify-content: center; gap: 20px; margin: 24px 0; }
    .dice { width: 100px; height: 100px; background: #fff; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 60px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: transform 0.3s; }
    .dice.rolling { animation: shake 0.5s infinite; }
    @keyframes shake { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-15deg); } }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; }
    .balance-box { display: flex; justify-content: space-between; padding: 8px 0; margin-bottom: 12px; font-size: 18px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .bet-buttons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .bet-row { display: grid; gap: 8px; }
    .bet-row.top { grid-template-columns: 1fr 1fr 1fr; }
    .bet-row.bottom { grid-template-columns: 1fr 1fr; }
    .bet-btn { padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; transition: transform 0.1s; }
    .bet-btn:active { transform: scale(0.95); }
    .bet-btn.selected { border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .btn-roll { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
    .btn-roll:active { transform: scale(0.98); }
    .btn-roll:disabled { opacity: 0.5; }
    .status-text { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; min-height: 28px; }
    .payout-info { font-size: 13px; color: #aaa; margin-top: 8px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 120px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn">← Назад</a></div>
  <div class="game-container">
    <h1>🎲 Кости</h1>
    <div class="status-text" id="status-text">Выберите сумму и бросайте!</div>
    <div class="dice-area">
      <div class="dice" id="dice1">⚀</div>
      <div class="dice" id="dice2">⚀</div>
    </div>
    <div class="controls-box">
      <div class="balance-box"><span>Баланс</span><span id="balance-display">1 000 ₽</span></div>
      <input type="number" id="bet-input" min="1" value="100" placeholder="Ставка" />
      <div class="bet-buttons" id="bet-buttons">
        <div class="bet-row top">
          <button class="bet-btn" data-bet="7" style="background:#ffd700;color:#000;">Сумма 7<br>x4</button>
          <button class="bet-btn" data-bet="11" style="background:#ff4757;">Сумма 11<br>x5</button>
          <button class="bet-btn" data-bet="2-12" style="background:#2ed573;">2 или 12<br>x10</button>
        </div>
        <div class="bet-row bottom">
          <button class="bet-btn" data-bet="even" style="background:#333;">Чёт<br>x1.5</button>
          <button class="bet-btn" data-bet="odd" style="background:#333;">Нечет<br>x1.5</button>
        </div>
      </div>
      <button class="btn-roll" id="btn-roll">🎲 Бросить кости</button>
      <div class="payout-info">Выплаты: Сумма 7=x4 | 11=x5 | 2/12=x10 | Чёт/Нечет=x1.5</div>
    </div>
    <div class="history-box" id="history-box">История бросков</div>
  </div>

  <script>
    const balanceEl = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const btnRoll = document.getElementById('btn-roll');
    const statusEl = document.getElementById('status-text');
    const dice1 = document.getElementById('dice1');
    const dice2 = document.getElementById('dice2');
    const historyBox = document.getElementById('history-box');
    const betBtns = document.querySelectorAll('.bet-btn');

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';
    function getCurrentUser() { return localStorage.getItem(CURRENT_USER_KEY); }
    function getUserBalance() { const u = getCurrentUser(); if(!u) return 1000; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) return a[u].balance; } catch(e) {} return 1000; }
    function saveBalance(b) { const u = getCurrentUser(); if(!u) return; try { const a = JSON.parse(localStorage.getItem(ACCOUNTS_KEY))||{}; if(a[u]) { a[u].balance = b; localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a)); } } catch(e) {} }
    if(!getCurrentUser()) window.location.href = 'index.html';

    let balance = getUserBalance();
    let selectedBet = null;
    let isRolling = false;
    const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

    function updateBalance() { balanceEl.textContent = `${balance.toLocaleString()} ₽`; }

    betBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        betBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedBet = btn.dataset.bet;
        statusEl.textContent = `Выбрано: ${btn.textContent.replace('\n',' ')}`;
        statusEl.style.color = '#fff';
      });
    });

    btnRoll.addEventListener('click', () => {
      if(isRolling) return;
      if(!selectedBet) { statusEl.textContent = 'Выберите тип ставки!'; statusEl.style.color = '#ff4757'; return; }
      const bet = Number(betInput.value);
      if(!bet || bet<=0 || bet>balance) { alert('Некорректная ставка'); return; }

      isRolling = true; btnRoll.disabled = true;
      balance -= bet; saveBalance(balance); updateBalance();
      statusEl.textContent = 'Бросаем...'; statusEl.style.color = '#ffa502';
      
      dice1.classList.add('rolling'); dice2.classList.add('rolling');
      
      let rollCount = 0;
      const rollInterval = setInterval(() => {
        dice1.textContent = diceFaces[Math.floor(Math.random()*6)];
        dice2.textContent = diceFaces[Math.floor(Math.random()*6)];
        rollCount++;
        if(rollCount >= 15) {
          clearInterval(rollInterval);
          dice1.classList.remove('rolling'); dice2.classList.remove('rolling');
          const v1 = Math.floor(Math.random()*6)+1;
          const v2 = Math.floor(Math.random()*6)+1;
          dice1.textContent = diceFaces[v1-1];
          dice2.textContent = diceFaces[v2-1];
          const sum = v1+v2;
          
          let win = 0;
          let won = false;
          switch(selectedBet) {
            case '7': if(sum===7) { win = bet*4; won = true; } break;
            case '11': if(sum===11) { win = bet*5; won = true; } break;
            case '2-12': if(sum===2||sum===12) { win = bet*10; won = true; } break;
            case 'even': if(sum%2===0) { win = Math.floor(bet*1.5); won = true; } break;
            case 'odd': if(sum%2===1) { win = Math.floor(bet*1.5); won = true; } break;
          }
          
          balance += win; saveBalance(balance); updateBalance();
          statusEl.textContent = won ? `Выпало ${v1}+${v2}=${sum}! +${win}₽` : `Выпало ${v1}+${v2}=${sum}. -${bet}₽`;
          statusEl.style.color = won ? '#2ed573' : '#ff4757';
          addHistory(won ? `🎲 ${v1}+${v2}=${sum}: +${win}₽` : `🎲 ${v1}+${v2}=${sum}: -${bet}₽`);
          isRolling = false; btnRoll.disabled = false;
        }
      }, 80);
    });

    function addHistory(t) { const p = document.createElement('div'); p.textContent = t; historyBox.prepend(p); while(historyBox.children.length>20) historyBox.lastChild.remove(); }
    updateBalance();
  </script>
</body>
</html>
