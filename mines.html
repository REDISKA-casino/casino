<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Минное поле</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1e1e1e;
      --text: #e0e0e0;
      --accent: #ff4757;
      --gold: #ffd700;
      --success: #2ed573;
      --cell-size: 36px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 0 16px;
      gap: 12px;
    }
    .back-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:active { transform: scale(0.95); }
    .balance-header {
      background: var(--panel);
      color: var(--gold);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid #333;
    }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container {
      width: 100%;
      max-width: 500px;
      padding: 16px;
    }
    .controls-box {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .stat-item {
      text-align: center;
      font-size: 12px;
    }
    .stat-value {
      display: block;
      font-weight: bold;
      font-size: 18px;
      margin-top: 4px;
    }
    .settings-box {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    .setting-item {
      text-align: left;
      max-width: 200px;
      margin: 0 auto;
    }
    .setting-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .setting-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: #fff;
      text-align: center;
      font-size: 16px;
      box-sizing: border-box;
    }
    .reward-info {
      font-size: 14px;
      color: #ffa502;
      margin-top: 8px;
      text-align: center;
    }
    .board-wrapper {
      position: relative;
      width: 100%;
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols, 10), var(--cell-size));
      grid-template-rows: repeat(var(--rows, 10), var(--cell-size));
      user-select: none;
      justify-content: center;
    }
    .cell {
      border: 1px solid #333;
      background: #111;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      color: #fff;
      position: relative;
      font-size: 16px;
      transition: background 0.15s;
    }
    .cell:hover {
      background: #1a1a1a;
    }
    .cell.revealed-safe {
      background: #0a3d0a;
      cursor: default;
    }
    .cell.revealed-mine {
      background: #3d0000;
      cursor: default;
    }
    .cell.disabled {
      cursor: default;
      opacity: 0.7;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-weight: bold;
      color: white;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: var(--success); }
    .btn-cashout { 
      background: #ffa502; 
      color: #000;
      display: none;
    }
    .bet-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: #fff;
      text-align: center;
      font-size: 18px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .history-box {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 12px;
    }
    .win-text { color: #2ed573; }
    .lose-text { color: #ff4757; }
    .cashout-text { color: #ffa502; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">← Назад</a>
    <span class="balance-header" id="header-balance">1 000 ₽</span>
  </div>
  <div class="game-container">
    <h1>💣 Сапёр</h1>

    <div class="controls-box">
      <div class="stat-item">
        Мины
        <span class="stat-value" id="mines-count">15</span>
      </div>
      <div class="stat-item">
        Выигрыш
        <span class="stat-value" id="win-display">0 ₽</span>
      </div>
      <div class="stat-item">
        Баланс
        <span class="stat-value" id="balance-display">1 000 ₽</span>
      </div>
    </div>

    <div class="settings-box">
      <div class="setting-item">
        <div class="setting-label">Количество мин (1-80)</div>
        <input type="number" class="setting-input" id="mines-input" min="1" max="80" value="15" />
      </div>
      <div class="reward-info" id="reward-info">💰 Награда за клетку: 2 ₽</div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board" style="--cols: 10; --rows: 10;"></div>
    </div>

    <input type="number" class="bet-input" id="bet-input" min="1" value="50" placeholder="Ставка" />

    <div class="btn-row">
      <button class="btn btn-start" id="btn-start">🎮 Играть</button>
      <button class="btn btn-cashout" id="btn-cashout">💸 Вывести</button>
    </div>

    <div class="history-box" id="history-box">История игр</div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const minesCountEl = document.getElementById('mines-count');
    const btnStart = document.getElementById('btn-start');
    const btnCashout = document.getElementById('btn-cashout');
    const betInput = document.getElementById('bet-input');
    const minesInput = document.getElementById('mines-input');
    const balanceDisplay = document.getElementById('balance-display');
    const winDisplay = document.getElementById('win-display');
    const headerBalance = document.getElementById('header-balance');
    const historyBox = document.getElementById('history-box');
    const rewardInfo = document.getElementById('reward-info');

    const ACCOUNTS_KEY = 'casino_accounts';
    const CURRENT_USER_KEY = 'current_user';

    function getCurrentUser() {
      return localStorage.getItem(CURRENT_USER_KEY);
    }

    function getUserBalance() {
      const currentUser = getCurrentUser();
      if (!currentUser) return 1000;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          return accounts[currentUser].balance;
        }
      } catch(e) {}
      return 1000;
    }

    function saveBalance(newBalance) {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      
      try {
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || {};
        if (accounts[currentUser]) {
          accounts[currentUser].balance = newBalance;
          localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
        }
      } catch(e) {}
    }

    if (!getCurrentUser()) {
      window.location.href = 'index.html';
    }

    let balance = getUserBalance();

    const ROWS = 10;
    const COLS = 10;
    const TOTAL_CELLS = ROWS * COLS;

    let minePositions = new Set();
    let revealedCells = new Set();
    let gameActive = false;
    let gameStarted = false;
    let currentBet = 0;
    let currentWinAmount = 0;
    let minesCount = 15;
    let rewardPerCell = 2;

    function calculateReward(mines) {
      // Чем больше мин, тем выше награда
      // Базовая формула: 2 + (мины / 10)
      return Math.floor(2 + (mines / 10));
    }

    function updateRewardDisplay() {
      const mines = Math.min(Math.max(parseInt(minesInput.value) || 15, 1), 80);
      const reward = calculateReward(mines);
      rewardInfo.textContent = `💰 Награда за клетку: ${reward} ₽ (чем больше мин, тем выше награда)`;
    }

    function updateBalanceDisplay() {
      balanceDisplay.textContent = `${balance.toLocaleString()} ₽`;
      headerBalance.textContent = `${balance.toLocaleString()} ₽`;
    }

    function updateWinDisplay() {
      winDisplay.textContent = `${currentWinAmount} ₽`;
    }

    function updateAllDisplays() {
      saveBalance(balance);
      updateBalanceDisplay();
    }

    function generateMines() {
      minePositions.clear();
      const maxMines = Math.min(minesCount, TOTAL_CELLS - 1);
      
      while (minePositions.size < maxMines) {
        const pos = Math.floor(Math.random() * TOTAL_CELLS);
        minePositions.add(pos);
      }
    }

    function createBoard() {
      boardEl.innerHTML = '';
      boardEl.style.setProperty('--cols', COLS);
      boardEl.style.setProperty('--rows', ROWS);

      for (let i = 0; i < TOTAL_CELLS; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.textContent = '?';
        cell.addEventListener('click', () => handleCellClick(i));
        boardEl.appendChild(cell);
      }
    }

    function resetGame() {
      minePositions.clear();
      revealedCells.clear();
      gameActive = false;
      gameStarted = false;
      currentWinAmount = 0;
      
      createBoard();
      updateWinDisplay();
      
      btnStart.disabled = false;
      btnStart.style.display = 'block';
      btnStart.textContent = '🎮 Играть';
      btnCashout.style.display = 'none';
      minesInput.disabled = false;
    }

    function startGame() {
      if (gameStarted) return;
      
      currentBet = Number(betInput.value);
      if (!currentBet || currentBet <= 0 || currentBet > balance) {
        alert('Некорректная ставка или недостаточно средств');
        return;
      }

      minesCount = Math.min(Math.max(parseInt(minesInput.value) || 15, 1), 80);
      rewardPerCell = calculateReward(minesCount);
      
      // Создаем новое поле с новыми минами
      createBoard();
      minePositions.clear();
      revealedCells.clear();
      
      minesInput.disabled = true;
      minesCountEl.textContent = minesCount;
      updateRewardDisplay();

      balance -= currentBet;
      updateAllDisplays();
      
      generateMines();
      
      gameStarted = true;
      gameActive = true;
      currentWinAmount = 0;
      updateWinDisplay();
      
      btnStart.style.display = 'none';
      btnCashout.style.display = 'block';
      btnCashout.disabled = false;
      
      addToHistory(`🎮 Ставка: ${currentBet} ₽ | Мины: ${minesCount} | Награда: ${rewardPerCell}₽`, '');
    }

    function handleCellClick(index) {
      if (!gameActive) return;
      if (revealedCells.has(index)) return;

      const cell = boardEl.querySelector(`.cell[data-index="${index}"]`);
      
      if (minePositions.has(index)) {
        // Нажата мина - поражение
        cell.classList.add('revealed-mine');
        cell.textContent = '💣';
        
        // Показываем все мины
        revealAllMines();
        
        gameActive = false;
        gameStarted = false;
        currentWinAmount = 0;
        updateWinDisplay();
        
        btnStart.style.display = 'block';
        btnStart.textContent = '🎮 Играть';
        btnCashout.style.display = 'none';
        minesInput.disabled = false;
        
        addToHistory(`💥 Поражение: -${currentBet} ₽ | Открыто: ${revealedCells.size} клеток`, 'lose');
        return;
      }

      // Безопасная клетка
      cell.classList.add('revealed-safe');
      cell.textContent = '✓';
      revealedCells.add(index);
      
      // Начисляем награду в зависимости от количества мин
      currentWinAmount += rewardPerCell;
      updateWinDisplay();
      
      // Проверяем, все ли безопасные клетки открыты
      const safeCells = TOTAL_CELLS - minePositions.size;
      if (revealedCells.size === safeCells) {
        // Все безопасные клетки открыты - автоматическая победа
        gameActive = false;
        gameStarted = false;
        
        balance += currentWinAmount;
        updateAllDisplays();
        
        btnStart.style.display = 'block';
        btnStart.textContent = '🎮 Играть';
        btnCashout.style.display = 'none';
        minesInput.disabled = false;
        
        addToHistory(`🎉 Все клетки открыты! +${currentWinAmount} ₽ (${revealedCells.size} × ${rewardPerCell}₽)`, 'win');
        
        // Показываем мины
        revealAllMines();
      }
    }

    function cashout() {
      if (!gameActive || !gameStarted) return;
      
      gameActive = false;
      gameStarted = false;
      
      // Добавляем текущий выигрыш к балансу
      balance += currentWinAmount;
      updateAllDisplays();
      
      btnStart.style.display = 'block';
      btnStart.textContent = '🎮 Играть';
      btnCashout.style.display = 'none';
      minesInput.disabled = false;
      
      addToHistory(`💸 Вывод: +${currentWinAmount} ₽ | Открыто: ${revealedCells.size} × ${rewardPerCell}₽`, 'cashout');
      
      // Показываем все мины
      revealAllMines();
      
      updateWinDisplay();
    }

    function revealAllMines() {
      for (let pos of minePositions) {
        const cell = boardEl.querySelector(`.cell[data-index="${pos}"]`);
        if (cell && !cell.classList.contains('revealed-mine')) {
          cell.classList.add('revealed-mine');
          cell.textContent = '💣';
        }
      }
      
      // Делаем все клетки некликабельными
      const allCells = boardEl.querySelectorAll('.cell');
      allCells.forEach(c => c.classList.add('disabled'));
    }

    function addToHistory(text, type) {
      const p = document.createElement('div');
      p.textContent = text;
      if (type === 'win') p.className = 'win-text';
      if (type === 'lose') p.className = 'lose-text';
      if (type === 'cashout') p.className = 'cashout-text';
      historyBox.prepend(p);
      while (historyBox.children.length > 20) {
        historyBox.lastChild.remove();
      }
    }

    // Обновление отображения награды при изменении количества мин
    minesInput.addEventListener('input', updateRewardDisplay);

    btnStart.addEventListener('click', startGame);
    btnCashout.addEventListener('click', cashout);

    // Инициализация
    updateBalanceDisplay();
    updateWinDisplay();
    createBoard();
    updateRewardDisplay();
  </script>
</body>
</html>
