<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Минное поле</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #ff4757; --gold: #ffd700; --success: #2ed573; --cell-size: 36px; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 0 16px; gap: 12px; }
    .back-btn { background: var(--panel); color: var(--text); border: 1px solid #333; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    .balance-header { background: var(--panel); color: var(--gold); padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #333; }
    h1 { margin: 16px 0; font-weight: 400; }
    .game-container { width: 100%; max-width: 500px; padding: 16px; }
    .controls-box { background: var(--panel); padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat-item { text-align: center; font-size: 12px; } .stat-value { display: block; font-weight: bold; font-size: 18px; margin-top: 4px; }
    .settings-box { background: var(--panel); padding: 16px; border-radius: 12px; margin-bottom: 16px; text-align: center; }
    .setting-item { text-align: left; max-width: 200px; margin: 0 auto; }
    .setting-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .setting-input { width: 100%; padding: 8px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 16px; box-sizing: border-box; }
    .reward-info { font-size: 14px; color: #ffa502; margin-top: 8px; text-align: center; }
    .board-wrapper { position: relative; width: 100%; background: #2a2a2a; border: 2px solid #444; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4); margin-bottom: 16px; }
    .board { display: grid; grid-template-columns: repeat(10, var(--cell-size)); grid-template-rows: repeat(10, var(--cell-size)); user-select: none; justify-content: center; }
    .cell { border: 1px solid #333; background: #111; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #fff; position: relative; font-size: 16px; }
    .cell.revealed-safe { background: #0a3d0a; cursor: default; } .cell.revealed-mine { background: #3d0000; cursor: default; } .cell.disabled { cursor: default; opacity: 0.7; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; }
    .btn:active { transform: scale(0.98); } .btn:disabled { opacity: 0.5; }
    .btn-start { background: var(--success); } .btn-cashout { background: #ffa502; color: #000; display: none; }
    .bet-input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; margin-bottom: 12px; }
    .history-box { background: var(--panel); padding: 12px; border-radius: 8px; font-size: 13px; max-height: 150px; overflow-y: auto; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="header"><a href="index.html" class="back-btn" onclick="localStorage.setItem('coming_back','true')">← Назад</a><span class="balance-header" id="header-balance">1000 ₽</span></div>
  <div class="game-container"><h1>💣 Минное поле</h1>
    <div class="controls-box"><div class="stat-item">Мины<span class="stat-value" id="mines-count">15</span></div><div class="stat-item">Выигрыш<span class="stat-value" id="win-display">0 ₽</span></div><div class="stat-item">Баланс<span class="stat-value" id="balance-display">1000 ₽</span></div></div>
    <div class="settings-box"><div class="setting-item"><div class="setting-label">Количество мин (1-80)</div><input type="number" class="setting-input" id="mines-input" min="1" max="80" value="15" /></div><div class="reward-info" id="reward-info">💰 Награда за клетку: 2 ₽</div></div>
    <div class="board-wrapper"><div class="board" id="board"></div></div>
    <input type="number" class="bet-input" id="bet-input" min="1" value="50" placeholder="Ставка" />
    <div class="btn-row"><button class="btn btn-start" id="btn-start">🎮 Играть</button><button class="btn btn-cashout" id="btn-cashout">💸 Вывести</button></div>
    <div class="history-box" id="history-box">История игр</div>
  </div>
  <script>
    const API_URL = 'https://lucky-finger.onrender.com';
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    let balance = parseInt(localStorage.getItem('bal_' + currentUser)) || 1000;
    let gameActive = false, gameStarted = false, currentBet = 0, currentWinAmount = 0, minesCount = 15, rewardPerCell = 2;
    let minePositions = new Set(), revealedCells = new Set(), accountsCache = {};
    const TOTAL_CELLS = 100, boardEl = document.getElementById('board');

    async function loadAcc() { try { const r = await fetch(API_URL); accountsCache = await r.json(); } catch(e) {} }
    async function saveAcc() { try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(accountsCache) }); } catch(e) {} }
    function saveBal() { localStorage.setItem('bal_' + currentUser, balance); updateDisplay(); syncWithCloud(); }
    async function syncWithCloud() { if (accountsCache[currentUser]) { accountsCache[currentUser].balance = balance; await saveAcc(); } }
    function updateDisplay() { document.getElementById('balance-display').textContent = `${balance.toLocaleString()} ₽`; document.getElementById('header-balance').textContent = `${balance.toLocaleString()} ₽`; document.getElementById('win-display').textContent = `${currentWinAmount} ₽`; }
    function calculateReward(m) { return Math.floor(2 + (m / 10)); }
    function updateRewardDisplay() { document.getElementById('reward-info').textContent = `💰 Награда за клетку: ${calculateReward(+document.getElementById('mines-input').value||15)} ₽`; }
    document.getElementById('mines-input').addEventListener('input', updateRewardDisplay);
    function createBoard() { boardEl.innerHTML = ''; for(let i=0;i<TOTAL_CELLS;i++){ const c=document.createElement('div'); c.className='cell'; c.dataset.index=i; c.textContent='?'; c.addEventListener('click',()=>handleClick(i)); boardEl.appendChild(c); } }
    function generateMines() { minePositions.clear(); const max=Math.min(minesCount,99); while(minePositions.size<max) minePositions.add(Math.floor(Math.random()*TOTAL_CELLS)); }

    document.getElementById('btn-start').onclick = () => {
      if(gameStarted) return;
      currentBet = +document.getElementById('bet-input').value;
      if(!currentBet||currentBet<=0||currentBet>balance){alert('Некорректная ставка');return;}
      minesCount = Math.min(Math.max(+document.getElementById('mines-input').value||15,1),80);
      rewardPerCell = calculateReward(minesCount);
      document.getElementById('mines-input').disabled = true;
      document.getElementById('mines-count').textContent = minesCount;
      balance -= currentBet; saveBal();
      createBoard(); minePositions.clear(); revealedCells.clear(); generateMines();
      gameStarted = true; gameActive = true; currentWinAmount = 0; updateDisplay();
      document.getElementById('btn-start').style.display='none'; document.getElementById('btn-cashout').style.display='block';
    };

    function handleClick(i) {
      if(!gameActive||revealedCells.has(i)) return;
      const cell = boardEl.querySelector(`[data-index="${i}"]`);
      if(minePositions.has(i)) { cell.classList.add('revealed-mine'); cell.textContent='💣'; revealAll(); gameActive=false; gameStarted=false; currentWinAmount=0; updateDisplay(); document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cashout').style.display='none'; document.getElementById('mines-input').disabled=false; return; }
      cell.classList.add('revealed-safe'); cell.textContent='✓'; revealedCells.add(i); currentWinAmount+=rewardPerCell; updateDisplay();
      if(revealedCells.size===TOTAL_CELLS-minePositions.size){ gameActive=false; gameStarted=false; balance+=currentWinAmount; saveBal(); document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cashout').style.display='none'; document.getElementById('mines-input').disabled=false; revealAll(); }
    }

    document.getElementById('btn-cashout').onclick = () => { if(!gameActive)return; gameActive=false; gameStarted=false; balance+=currentWinAmount; saveBal(); document.getElementById('btn-start').style.display='block'; document.getElementById('btn-cashout').style.display='none'; document.getElementById('mines-input').disabled=false; revealAll(); updateDisplay(); };
    function revealAll() { for(let p of minePositions){ const c=boardEl.querySelector(`[data-index="${p}"]`); if(c&&!c.classList.contains('revealed-mine')){c.classList.add('revealed-mine');c.textContent='💣';} } }

    updateDisplay(); createBoard(); updateRewardDisplay();
    (async () => { await loadAcc(); })();
  </script>
</body>
</html>
